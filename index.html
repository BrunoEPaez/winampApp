<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Cyber-Environment Modular</title>
    <style>
        /* ESTILOS GLOBALES Y PALETA GRIS AZULADO FRANCIA */
        body {
            background-color: #243146;
            color: #00d4ff;
            font-family: monospace;
            margin: 10px; padding: 0;
            display: flex; flex-direction: column;
            height: calc(100vh - 20px); overflow: hidden;
        }
        .tabs-container {
            display: flex; gap: 5px; background: #243146;
            padding-bottom: 5px; border-bottom: 1px solid #3d4f6e; z-index: 1000;
        }
        .tab-btn {
            background: #1e293b; color: #00d4ff; border: 1px solid #7000ff;
            padding: 6px 14px; cursor: pointer; font-family: monospace;
            font-weight: bold; border-radius: 4px 4px 0 0; font-size: 11px; outline: none;
        }
        .tab-btn:hover { background: #7000ff; color: #fff; }
        .tab-btn.active {
            background: #00d4ff; color: #121824;
            box-shadow: 0px 0px 12px rgba(0, 212, 255, 0.5); border-color: #00d4ff;
        }
        .view-section { display: none; flex-grow: 1; height: calc(100% - 35px); }
        .view-section.active { display: flex; flex-direction: column; }

        /* ESTILOS COMPARTIDOS POR LOS MÓDULOS */
        .winamp-box { background: #2e3d54; border: 3px double #7000ff; padding: 20px; width: 380px; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); margin-top: 10px; }
        .info-tema { background: #1a2433; padding: 8px; border: 1px inset #3d4f6e; font-size: 12px; margin-bottom: 10px; text-overflow: ellipsis; overflow: hidden; color: #00d4ff; }
        .controles { display: flex; flex-direction: column; gap: 10px; }
        .fila-botones { display: flex; gap: 5px; justify-content: space-between; }
        .fila-volumen { display: flex; align-items: center; gap: 10px; background: #1a2433; padding: 5px; }
        .fila-volumen input { flex-grow: 1; accent-color: #00d4ff; }
        button { background: #3a4b66; color: #00d4ff; border: 1px solid #7000ff; padding: 6px 10px; cursor: pointer; font-family: monospace; font-weight: bold; border-radius: 3px; }
        button:hover, button.activo { background: #00d4ff; color: #121824; border-color: #00d4ff; }
        input[type="file"] { display: none; }
        .playlist-box { background: #1a2433; border: 1px solid #3d4f6e; max-height: 120px; overflow-y: auto; margin-top: 10px; padding: 5px; font-size: 11px; }
        .track { padding: 4px; cursor: pointer; color: #cbd5e0; }
        .track:hover { background: #3a4b66; color: #fff; }
        .track.seleccionada { color: #121824; background: #00d4ff; font-weight: bold; }
        .workspace-layout { display: flex; width: 100%; flex-grow: 1; background: #2b3a52; border: 1px solid #3d4f6e; border-radius: 4px; margin-top: 5px; height: 100%; overflow: hidden; }
        .sidebar { width: 240px; background: #1e293b; border-right: 1px solid #3d4f6e; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; height: 100%; }
        .sidebar-title { font-size: 11px; font-weight: bold; color: #a855f7; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .list-tree { flex-grow: 1; overflow-y: auto; font-size: 12px; color: #cbd5e0; }
        .tree-item { padding: 6px 8px; cursor: pointer; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tree-item:hover { background: #3a4b66; color: #00d4ff; }
        .tree-item.activo { background: #7000ff; color: #fff; font-weight: bold; box-shadow: 0 0 8px rgba(112,0,255,0.4); }
        .main-content-area { flex-grow: 1; display: flex; flex-direction: column; background: #243146; position: relative; height: 100%; }
        #editor-monaco { flex-grow: 1; width: 100%; height: 60%; min-height: 200px; background: #1e1e1e; }
        .bottom-panel-terminal { height: 180px; background: #161f2c; border-top: 1px solid #3d4f6e; display: flex; flex-direction: column; }
        .terminal-header { background: #1e293b; padding: 6px 10px; font-size: 11px; color: #00d4ff; border-bottom: 1px solid #3d4f6e; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .terminal-output { flex-grow: 1; padding: 8px; overflow-y: auto; color: #fff; font-size: 12px; white-space: pre-wrap; font-family: 'Courier New', Courier, monospace; }
        .terminal-input-row { display: flex; background: #0f1520; border-top: 1px solid #3d4f6e; padding: 6px; }
        .terminal-prompt { color: #7000ff; padding-right: 5px; font-weight: bold; }
        .terminal-input { flex-grow: 1; background: transparent; border: none; color: #fff; font-family: monospace; font-size: 12px; outline: none; }
        .browser-container { display: flex; flex-direction: column; width: 100%; height: 100%; background: #fff; border: 1px solid #3d4f6e; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .browser-bar { display: flex; gap: 5px; background: #1e293b; padding: 5px; align-items: center; border-bottom: 1px solid #3d4f6e; }
        .browser-input { flex-grow: 1; background: #161f2c; border: 1px solid #7000ff; color: #00d4ff; padding: 6px; font-family: monospace; outline: none; border-radius: 3px; }
        webview { width: 100%; flex-grow: 1; background: white; }
        .obsidian-textarea { flex-grow: 1; background: #243146; color: #e2e8f0; border: none; padding: 15px; font-family: sans-serif; font-size: 15px; resize: none; outline: none; line-height: 1.6; height: 100%; }
    </style>
</head>
<body>

    <div class="tabs-container">
        <button class="tab-btn active" id="btn-tab-audio" onclick="cambiarVista('audio', this)">🎵 AUDIO</button>
        <button class="tab-btn" id="btn-tab-video" onclick="cambiarVista('video', this)">🎬 VIDEO</button>
        <button class="tab-btn" id="btn-tab-editor" onclick="cambiarVista('editor', this)">📝 CODE</button>
        <button class="tab-btn" id="btn-tab-browser" onclick="cambiarVista('browser', this)">🌐 BROWSER</button>
        <button class="tab-btn" id="btn-tab-obsidian" onclick="cambiarVista('obsidian', this)">📓 OBSIDIAN</button>
    </div>

    <video id="reproductorGlobal" style="display: none;"></video>

    <div id="vista-audio" class="view-section active"></div>
    <div id="vista-video" class="view-section"></div>
    <div id="vista-editor" class="view-section"></div>
    <div id="vista-browser" class="view-section"></div>
    <div id="vista-obsidian" class="view-section"></div>

    <script>
        // 1. CAPTURAMOS LAS REFERENCIAS NATIVAS DE NODE DE ENTRADA
        window.nodeRequire = require;
        const fs = require('fs');
        const path = require('path');
        const { ipcRenderer } = require('electron');
        const { exec } = require('child_process');

        // Inyección modular de componentes HTML desde la carpeta 'tabs'
        const cargarMódulo = (id) => {
            const rutaTab = path.join(__dirname, 'tabs', `${id}.html`);
            if (fs.existsSync(rutaTab)) {
                document.getElementById(`vista-${id}`).innerHTML = fs.readFileSync(rutaTab, 'utf-8');
            }
        };
        
        ['audio', 'video', 'editor', 'browser', 'obsidian'].forEach(cargarMódulo);

        // 2. PARCHE MAESTRO ANTICONFLICTO: 
        // Ocultamos temporalmente el require nativo global para que RequireJS no se vuelva loco
        window.require = undefined;
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>

    <script>
        // Guardamos el require de la web exclusivamente para Monaco en una variable propia
        window.webRequire = window.require;
        
        // Y restauramos de inmediato el require original para no romper el resto de la app
        window.require = window.nodeRequire;

        const medio = document.getElementById('reproductorGlobal');
        
        let playlist = [];
        let indiceActual = 0;
        let esMute = false;
        let volumenPrevio = 1;
        let editorInstancia = null;
        let rutaProyectoActual = '';
        let archivoCodigoAbierto = '';
        let rutaVaultActual = '';
        let archivoNotaAbierto = '';

        // 4. CONFIGURAMOS MONACO USANDO EL CARGADOR DE LA WEB ASILADO
        window.webRequire.config({ 
            paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }
        });

        window.onload = () => {
            const ultimaUrl = localStorage.getItem('browser_ultima_url');
            if (ultimaUrl && document.getElementById('browser-url')) {
                document.getElementById('browser-url').value = ultimaUrl;
                document.getElementById('web-view').src = ultimaUrl;
            }

            const ultimaCarpetaCode = localStorage.getItem('code_ultima_carpeta');
            if (ultimaCarpetaCode && window.nodeRequire('fs').existsSync(ultimaCarpetaCode)) {
                rutaProyectoActual = ultimaCarpetaCode;
                renderListaFisica(rutaProyectoActual, 'listaArchivosCode', false);
            }

            const ultimoVault = localStorage.getItem('obsidian_ultimo_vault');
            if (ultimoVault && window.nodeRequire('fs').existsSync(ultimoVault)) {
                rutaVaultActual = ultimoVault;
                renderListaFisica(rutaVaultActual, 'listaNotasMD', true);
            }

            const ultimaTab = localStorage.getItem('app_ultima_tab') || 'audio';
            const botonTab = document.getElementById(`btn-tab-${ultimaTab}`);
            if (botonTab) cambiarVista(ultimaTab, botonTab);

            const wv = document.getElementById('web-view');
            if (wv) {
                wv.addEventListener('did-navigate', (e) => {
                    if(document.getElementById('browser-url')) document.getElementById('browser-url').value = e.url;
                    localStorage.setItem('browser_ultima_url', e.url);
                });
            }
        };

        function inicializarEditor() {
            if (editorInstancia) return;

            // Usamos la referencia web aislada para renderizar el editor visual de forma segura
            window.webRequire(['vs/editor/editor.main'], function() {
                editorInstancia = monaco.editor.create(document.getElementById('editor-monaco'), {
                    value: '// Escribe o selecciona un archivo aquí...\n// ¡Monaco funcionando con soporte de carpetas nativas!',
                    language: 'javascript',
                    theme: 'vs-dark',
                    automaticLayout: true,
                    minimap: { enabled: false },
                    fontSize: 14,
                    fontFamily: 'monospace'
                });

                editorInstancia.onDidChangeModelContent(() => {
                    if (archivoCodigoAbierto && editorInstancia) {
                        window.nodeRequire('fs').writeFileSync(archivoCodigoAbierto, editorInstancia.getValue(), 'utf-8');
                    }
                });

                const ultimoArchivo = localStorage.getItem('code_ultimo_archivo');
                if (ultimoArchivo && window.nodeRequire('fs').existsSync(ultimoArchivo)) {
                    abrirCodigoEnEditor(ultimoArchivo);
                }
            });
        }

        function cambiarVista(vistaId, botonCliquado) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(`vista-${vistaId}`).classList.add('active');
            if (botonCliquado) botonCliquado.classList.add('active');

            localStorage.setItem('app_ultima_tab', vistaId);

            if (vistaId === 'video') {
                medio.style.display = 'block';
                medio.controls = true;
                const contVid = document.getElementById('contenedorVideoReal');
                if(contVid) contVid.appendChild(medio);
            } else {
                medio.style.display = 'none';
                document.body.appendChild(medio);
            }

            if (vistaId === 'editor') {
                inicializarEditor();
                setTimeout(() => { if (editorInstancia) editorInstancia.layout(); }, 100);
            }
        }

        async function abrirSelectorCarpeta(tipo) {
            const ruta = await ipcRenderer.invoke('seleccionar-carpeta');
            if (!ruta) return;

            if (tipo === 'code') {
                rutaProyectoActual = ruta;
                localStorage.setItem('code_ultima_carpeta', ruta);
                renderListaFisica(rutaProyectoActual, 'listaArchivosCode', false);
                printTerminal(`Carpeta vinculada: ${ruta}`);
            } else if (tipo === 'notes') {
                rutaVaultActual = ruta;
                localStorage.setItem('obsidian_ultimo_vault', ruta);
                renderListaFisica(rutaVaultActual, 'listaNotasMD', true);
            }
        }

        function renderListaFisica(ruta, contenedorId, soloMarkdown) {
            const divContenedor = document.getElementById(contenedorId);
            if(!divContenedor) return;
            divContenedor.innerHTML = '';

            try {
                const nativeFs = window.nodeRequire('fs');
                const nativePath = window.nodeRequire('path');
                const elementos = nativeFs.readdirSync(ruta);
                const cachedArchivo = localStorage.getItem(soloMarkdown ? 'obsidian_ultima_nota' : 'code_ultimo_archivo');

                elementos.forEach(elemento => {
                    const rutaCompleta = nativePath.join(ruta, elemento);
                    const stat = nativeFs.statSync(rutaCompleta);
                    if (stat.isFile()) {
                        const extension = nativePath.extname(elemento).toLowerCase();
                        if (soloMarkdown && extension !== '.md') return;

                        const item = document.createElement('div');
                        item.className = 'tree-item';
                        if (cachedArchivo === rutaCompleta) item.classList.add('activo');
                        item.innerText = soloMarkdown ? `📓 ${elemento}` : `📄 ${elemento}`;
                        
                        item.onclick = () => {
                            divContenedor.querySelectorAll('.tree-item').forEach(i => i.classList.remove('activo'));
                            item.classList.add('activo');
                            if (soloMarkdown) abrirNotaObsidian(rutaCompleta); else abrirCodigoEnEditor(rutaCompleta);
                        };
                        divContenedor.appendChild(item);
                    }
                });
                if (soloMarkdown && cachedArchivo && nativeFs.existsSync(cachedArchivo)) abrirNotaObsidian(cachedArchivo);
            } catch (e) { console.error(e); }
        }

        function abrirCodigoEnEditor(ruta) {
            try {
                if (!editorInstancia) return;
                const nativeFs = window.nodeRequire('fs');
                const nativePath = window.nodeRequire('path');
                const contenido = nativeFs.readFileSync(ruta, 'utf-8');
                archivoCodigoAbierto = ruta;
                localStorage.setItem('code_ultimo_archivo', ruta);
                
                const ext = nativePath.extname(ruta).toLowerCase();
                let lang = 'javascript';
                if (ext === '.py') lang = 'python';
                if (ext === '.rs') lang = 'rust';
                if (ext === '.html') lang = 'html';
                if (ext === '.css') lang = 'css';
                if (ext === '.json') lang = 'json';
                if (ext === '.md') lang = 'markdown';
                
                const antiguoModelo = editorInstancia.getModel();
                const nuevoModelo = monaco.editor.createModel(contenido, lang);
                editorInstancia.setModel(nuevoModelo);
                if (antiguoModelo) antiguoModelo.dispose();
                
                printTerminal(`Archivo cargado: ${nativePath.basename(ruta)}`);
            } catch (err) { printTerminal(`Error leyendo archivo: ${err.message}`, true); }
        }

        function ejecutarCodigoActual() {
            if (!archivoCodigoAbierto || !editorInstancia) return;
            const nativeFs = window.nodeRequire('fs');
            const nativePath = window.nodeRequire('path');
            nativeFs.writeFileSync(archivoCodigoAbierto, editorInstancia.getValue(), 'utf-8');
            const extension = nativePath.extname(archivoCodigoAbierto).toLowerCase();
            let comandoEjecucion = '';

            if (extension === '.js') comandoEjecucion = `node "${archivoCodigoAbierto}"`;
            else if (extension === '.py') comandoEjecucion = `python "${archivoCodigoAbierto}"`;
            else if (extension === '.rs') {
                const rutaBinario = archivoCodigoAbierto.replace('.rs', '');
                comandoEjecucion = `rustc "${archivoCodigoAbierto}" && "${rutaBinario}"`;
            } else { return; }

            printTerminal(`[RUNNING]: ${comandoEjecucion}`);
            window.nodeRequire('child_process').exec(comandoEjecucion, (error, stdout, stderr) => {
                if (error) { printTerminal(`❌ ERROR:\n${stderr || error.message}`, true); return; }
                printTerminal(`✨ SALIDA:\n${stdout}`);
            });
        }

        function navegarUrl(e) { if (e.key === 'Enter') irAUrl(); }
        function irAUrl() {
            let url = document.getElementById('browser-url').value.trim();
            if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
            document.getElementById('web-view').src = url;
        }

        function abrirNotaObsidian(ruta) {
            try {
                document.getElementById('editorObsidian').value = window.nodeRequire('fs').readFileSync(ruta, 'utf-8');
                archivoNotaAbierto = ruta;
                localStorage.setItem('obsidian_ultima_nota', ruta);
            } catch (err) {}
        }
        function guardarNotaObsidian() {
            if (archivoNotaAbierto) window.nodeRequire('fs').writeFileSync(archivoNotaAbierto, document.getElementById('editorObsidian').value, 'utf-8');
        }
        function crearNuevaNota() {
            if (!rutaVaultActual) return;
            const nombreNota = prompt("Nombre de la nota:"); if (!nombreNota) return;
            const nativePath = window.nodeRequire('path');
            const rutaFinal = nativePath.join(rutaVaultActual, `${nombreNota}.md`);
            window.nodeRequire('fs').writeFileSync(rutaFinal, `# ${nombreNota}\n`, 'utf-8');
            renderListaFisica(rutaVaultActual, 'listaNotasMD', true);
            abrirNotaObsidian(rutaFinal);
        }

        function printTerminal(t, err = false) {
            const out = document.getElementById('outputTerminal'); if(!out) return;
            out.innerHTML += `<div style="color: ${err ? '#ff5555' : '#00d4ff'}; margin-top:5px; border-left: 3px solid ${err ? '#ff3333' : '#7000ff'}; padding-left: 5px;">${t}</div>`;
            out.scrollTop = out.scrollHeight;
        }
        function procesarComando(e) {
            if (e.key === 'Enter') {
                const el = document.getElementById('inputTerminal'); const cmd = el.value.trim(); if (!cmd) return;
                printTerminal(`&gt; ${cmd}`); el.value = '';
                if (cmd === 'clear' || cmd === 'cls') { document.getElementById('outputTerminal').innerHTML = ''; return; }
                try { printTerminal(eval(cmd)); } catch (err) { printTerminal(`Error: ${err.message}`, true); }
            }
        }

        // MULTIMEDIA
        function agregarAplaylist(input, tipo) {
            Array.from(input.files).forEach(f => playlist.push({ nombre: f.name, url: URL.createObjectURL(f), tipo }));
            actualizarInterfaces();
            if (medio.paused && !medio.src && playlist.length > 0) cargarTrack(playlist.length - input.files.length);
        }
        function actualizarInterfaces() {
            const pla = document.getElementById('playlistAudio'); const plv = document.getElementById('playlistVideo');
            if(pla) pla.innerHTML = playlist.filter(t => t.tipo === 'audio').length ? '' : '<div style="color:#888;text-align:center;padding-top:40px;">Playlist vacía</div>';
            if(plv) plv.innerHTML = playlist.filter(t => t.tipo === 'video').length ? '' : '<div style="color:#888;text-align:center;padding-top:40px;">Playlist vacía</div>';
            playlist.forEach((t, i) => {
                const d = document.createElement('div'); d.className = `track ${i === indiceActual && medio.src ? 'seleccionada' : ''}`;
                d.innerText = `${i + 1}. ${t.tipo === 'audio' ? '🎵' : '🎬'} ${t.nombre}`; d.onclick = () => cargarTrack(i);
                if(t.tipo === 'audio' && pla) pla.appendChild(d); else if(t.tipo === 'video' && plv) plv.appendChild(d);
            });
        }
        function cargarTrack(i) {
            if (i < 0 || i >= playlist.length) return; indiceActual = i; medio.src = playlist[i].url;
            const na = document.getElementById('nombreAudio'); const nv = document.getElementById('nombreVideo');
            if (playlist[i].tipo === 'audio' && na) na.innerText = `TRACK: ${playlist[i].nombre.toUpperCase()}`; else if(nv) nv.innerText = `VIDEO: ${playlist[i].nombre.toUpperCase()}`;
            actualizarInterfaces(); reproducir();
        }
        function reproducir() { if (medio.src) medio.play(); }
        function pausar() { medio.pause(); }
        function detener() { medio.pause(); medio.currentTime = 0; }
        function siguienteTrack() { if (indiceActual + 1 < playlist.length) cargarTrack(indiceActual + 1); else if (playlist.length > 0) cargarTrack(0); }
        function anteriorTrack() { if (indiceActual - 1 >= 0) cargarTrack(indiceActual - 1); else if (playlist.length > 0) cargarTrack(playlist.length - 1); }
        function cambiarVolumen(v) { medio.volume = v; if(document.getElementById('txtVolumen')) document.getElementById('txtVolumen').innerText = `${Math.round(v * 100)}%`; if(document.getElementById('btnMute')) document.getElementById('btnMute').innerText = v > 0 ? "🔊" : "🔇"; }
        function alternarMute() { if (!esMute) { volumenPrevio = medio.volume; cambiarVolumen(0); if(document.getElementById('controlVolumen')) document.getElementById('controlVolumen').value = 0; esMute = true; } else { cambiarVolumen(volumenPrevio); if(document.getElementById('controlVolumen')) document.getElementById('controlVolumen').value = volumenPrevio; esMute = false; } }
        function alternarLoop() { medio.loop = !medio.loop; const bl = document.getElementById('btnLoop'); if(bl){ bl.innerText = medio.loop ? "🔁 LOOP (ON)" : "🔁 LOOP (OFF)"; bl.classList.toggle('activo', medio.loop); } }
        function limpiarPlaylist() { detener(); medio.src = ""; playlist = []; indiceActual = 0; if(document.getElementById('nombreAudio')) document.getElementById('nombreAudio').innerText = "TRACK: (Ninguno cargado)"; actualizarInterfaces(); }
        medio.addEventListener('ended', () => { if (!medio.loop) siguienteTrack(); });
    </script>
</body>
</html>
