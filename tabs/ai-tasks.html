<div class="workspace-layout" style="display: flex; width: 100%; height: 100%; background: #243146; overflow: hidden; margin-top: 0px; gap: 8px; padding: 5px; box-sizing: border-box;">
    
    <div style="flex: 1; background: #1e293b; border: 1px solid #3d4f6e; border-radius: 4px; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; overflow-y: auto;">
        <div class="sidebar-title" style="color: #00ff66; font-size: 11px; font-weight: bold; margin-bottom: 8px;">🧠 CYBER AI LAB GENERATOR</div>
        
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <div>
                <label style="font-size: 11px; color: #888; display: block; margin-bottom: 4px;">PROMPT CREATIVO (Imágenes / Video / Música):</label>
                <textarea id="ai-prompt-input" style="width: 100%; height: 60px; background: #161f2c; border: 1px solid #7000ff; color: #00d4ff; font-family: monospace; font-size: 12px; padding: 6px; box-sizing: border-box; outline: none; border-radius: 3px;" placeholder="Escribí tu prompt acá..."></textarea>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                <button onclick="generarContenidoIA('imagen')" style="font-size: 11px; background: #2e3d54; border-color: #00ff66; color: #fff;">🖼️ GEN IMAGEN</button>
                <button onclick="generarContenidoIA('video')" style="font-size: 11px; background: #2e3d54; border-color: #00ff66; color: #fff;">🎬 GEN VIDEO</button>
                <button onclick="generarContenidoIA('musica')" style="font-size: 11px; background: #2e3d54; border-color: #a855f7; color: #fff; grid-column: span 2;">🎵 GEN MÚSICA (STYLE TRACK)</button>
            </div>

            <div id="ai-monitor-output" style="background: #0f1520; border: 1px dashed #3d4f6e; padding: 8px; border-radius: 3px; font-size: 11px; min-height: 80px; color: #cbd5e0; white-space: pre-wrap; font-family: monospace;">[AI STATUS]: Listo para procesar requerimientos de contenido multimedia...</div>
        </div>

        <div style="margin-top: 15px; border-top: 1px dashed #3d4f6e; padding-top: 10px;">
            <div class="sidebar-title" style="color: #00d4ff; font-size: 10px; margin-bottom: 5px;">⚡ SCRAPPER / DESCARGADOR OFFLINE</div>
            <input type="text" id="scrapper-url-input" style="width: 100%; background: #161f2c; border: 1px solid #3d4f6e; color: #00d4ff; padding: 6px; font-size: 11px; font-family: monospace; box-sizing: border-box; outline: none; border-radius: 3px;" placeholder="Pegar URL de video o audio de estudio...">
            
            <div style="display: flex; gap: 4px; margin-top: 4px;">
                <button onclick="ejecutarDescargaRecurso('audio')" style="flex-grow: 1; font-size: 10px; padding: 4px;">🎵 Extraer Audio</button>
                <button onclick="ejecutarDescargaRecurso('file')" style="flex-grow: 1; font-size: 10px; padding: 4px;">💾 Bajar Binario</button>
            </div>
        </div>
    </div>

    <div style="flex: 2; background: #161f2c; border: 1px solid #3d4f6e; border-radius: 4px; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; overflow: hidden;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <div class="sidebar-title" style="color: #a855f7; font-size: 11px; font-weight: bold; margin-bottom: 0;">📋 TABLERO KANBAN DE ESTUDIO LOCAL</div>
            <button onclick="agregarNuevaTareaKanban()" style="font-size: 10px; padding: 2px 6px; background: #7000ff; border-color: #00d4ff; color: #fff;">+ Nueva Tarea</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; flex-grow: 1; overflow: hidden;">
            
            <div style="background: #1e293b; padding: 6px; border-radius: 4px; display: flex; flex-direction: column; overflow: hidden;">
                <div style="font-size: 11px; font-weight: bold; color: #ff5555; text-align: center; border-bottom: 1px solid #ff5555; padding-bottom: 4px; margin-bottom: 6px;">POR HACER</div>
                <div id="kanban-col-todo" style="flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px;"></div>
            </div>

            <div style="background: #1e293b; padding: 6px; border-radius: 4px; display: flex; flex-direction: column; overflow: hidden;">
                <div style="font-size: 11px; font-weight: bold; color: #00d4ff; text-align: center; border-bottom: 1px solid #00d4ff; padding-bottom: 4px; margin-bottom: 6px;">ESTUDIANDO</div>
                <div id="kanban-col-progress" style="flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px;"></div>
            </div>

            <div style="background: #1e293b; padding: 6px; border-radius: 4px; display: flex; flex-direction: column; overflow: hidden;">
                <div style="font-size: 11px; font-weight: bold; color: #00ff66; text-align: center; border-bottom: 1px solid #00ff66; padding-bottom: 4px; margin-bottom: 6px;">DOMINADO</div>
                <div id="kanban-col-done" style="flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px;"></div>
            </div>

        </div>
    </div>

</div>

<script>
// Lógica interna del Tablero Kanban persistente en archivo .json local
const pathNode = require('path');
const fsNode = require('fs');
const rutaArchivoKanban = pathNode.join(__dirname, 'kanban_estudio.json');

let tareasKanban = [
    { id: 1, titulo: "Practicar punteros crudos en Rust", estado: "todo" },
    { id: 2, titulo: "Dominar Next.js y routing modular", estado: "progress" },
    { id: 3, titulo: "Parchear ciclo de vida WebView Electron", estado: "done" }
];

function cargarKanbanDeDisco() {
    try {
        if (fsNode.existsSync(rutaArchivoKanban)) {
            tareasKanban = JSON.parse(fsNode.readFileSync(rutaArchivoKanban, 'utf-8'));
        } else {
            guardarKanbanEnDisco();
        }
    } catch (e) { console.error("Error leyendo Kanban:", e); }
    renderizarTableroKanban();
}

function guardarKanbanEnDisco() {
    try {
        fsNode.writeFileSync(rutaArchivoKanban, JSON.stringify(tareasKanban, null, 2), 'utf-8');
    } catch (e) { console.error("Error guardando Kanban:", e); }
}

function renderizarTableroKanban() {
    const cols = {
        todo: document.getElementById('kanban-col-todo'),
        progress: document.getElementById('kanban-col-progress'),
        done: document.getElementById('kanban-col-done')
    };
    
    if(!cols.todo || !cols.progress || !cols.done) return;
    
    // Limpiar columnas
    Object.values(cols).forEach(c => c.innerHTML = "");

    tareasKanban.forEach(t => {
        const tarjeta = document.createElement('div');
        tarjeta.style = "background: #161f2c; border: 1px solid #3d4f6e; padding: 8px; border-radius: 3px; font-size: 11px; color: #cbd5e0; display: flex; flex-direction: column; gap: 5px;";
        tarjeta.innerText = t.titulo;

        const filaBotones = document.createElement('div');
        filaBotones.style = "display: flex; justify-content: space-between; margin-top: 4px;";

        // Botón de Retroceso de columna
        if (t.estado !== 'todo') {
            const btnBack = document.createElement('button');
            btnBack.innerText = "◀";
            btnBack.style = "padding: 1px 4px; font-size: 9px;";
            btnBack.onclick = () => moverTarea(t.id, t.estado === 'done' ? 'progress' : 'todo');
            filaBotones.appendChild(btnBack);
        } else {
            filaBotones.appendChild(document.createElement('span'));
        }

        // Botón Eliminar
        const btnDel = document.createElement('button');
        btnDel.innerText = "❌";
        btnDel.style = "padding: 1px 4px; font-size: 9px; border-color: #ff5555; background: transparent; color: #ff5555;";
        btnDel.onclick = () => eliminarTareaKanban(t.id);
        filaBotones.appendChild(btnDel);

        // Botón de Avance de columna
        if (t.estado !== 'done') {
            const btnNext = document.createElement('button');
            btnNext.innerText = "▶";
            btnNext.style = "padding: 1px 4px; font-size: 9px;";
            btnNext.onclick = () => moverTarea(t.id, t.estado === 'todo' ? 'progress' : 'done');
            filaBotones.appendChild(btnNext);
        }

        tarjeta.appendChild(filaBotones);
        if (cols[t.estado]) cols[t.estado].appendChild(tarjeta);
    });
}

function agregarNuevaTareaKanban() {
    const titulo = prompt("¿Qué concepto o código vas a traquear?");
    if (!titulo) return;
    const nueva = { id: Date.now(), titulo: titulo, estado: 'todo' };
    tareasKanban.push(nueva);
    guardarKanbanEnDisco();
    renderizarTableroKanban();
}

function moverTarea(id, nuevoEstado) {
    tareasKanban = tareasKanban.map(t => t.id === id ? { ...t, estado: nuevoEstado } : t);
    guardarKanbanEnDisco();
    renderizarTableroKanban();
}

function eliminarTareaKanban(id) {
    tareasKanban = tareasKanban.filter(t => t.id !== id);
    guardarKanbanEnDisco();
    renderizarTableroKanban();
}

// =========================================================================
// INTEGRACIÓN NATIVA: SIMULACIÓN DE OPERATIVIDAD IA / SCRAPPER NATIVO
// =========================================================================
function generarContenidoIA(tipo) {
    const promptTxt = document.getElementById('ai-prompt-input').value.trim();
    const monitor = document.getElementById('ai-monitor-output');
    if (!promptTxt) { alert("Escribí un prompt primero."); return; }

    monitor.innerText = `[PROCESANDO NÚCLEO IA]: Generando ${tipo.toUpperCase()} basada en prompt...\n"${promptTxt}"`;
    
    // Aquí podés acoplar mediante un fetch() tu servidor local de Ollama (IA de texto)
    // o scripts de Python que hagan peticiones a APIs generativas (Stable Diffusion, Suno, etc.)
    setTimeout(() => {
        monitor.innerText += `\n\n✨ [PRODUCCIÓN COMPLETADA]: El recurso de tipo [${tipo.toUpperCase()}] se ha procesado con éxito de forma local y simulada.\nPara acoplar un backend real, conecta tu API key o endpoint en tabs/ai-tasks.html.`;
    }, 2000);
}

function ejecutarDescargaRecurso(modo) {
    const url = document.getElementById('scrapper-url-input').value.trim();
    if (!url) { alert("Ingresá una URL válida de estudio."); return; }
    
    const monitor = document.getElementById('ai-monitor-output');
    monitor.innerText = `[SCRAPPER RUNNING]: Descargando recurso en segundo plano (${modo})...\nURL: ${url}`;
    
    // Al estar en Electron, podés mandar a ejecutar de forma nativa binarios como yt-dlp o wget vía terminal oculta
    // Ejemplo real: exec(\`yt-dlp -x --audio-format mp3 "\${url}"\`, (err, stdout, stderr) => { ... })
    setTimeout(() => {
        monitor.innerText += `\n\n💾 [DESCARGA TERMINADA]: Recurso acoplado a la carpeta del sistema de forma offline. El audio/archivo se encuentra listo para indexarse a tus playlists de estudio.`;
    }, 2500);
}

// Levantar el estado físico del Kanban al renderizar la pestaña
setTimeout(cargarKanbanDeDisco, 250);
</script>
