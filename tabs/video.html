<div class="winamp-box" style="width: 550px; margin: auto; margin-top: 20px; background: #1e293b; border: 2px solid #7000ff; border-radius: 6px; padding: 12px;"> 
    
    <div id="contenedorVideoReal" style="width: 100%; height: 280px; background: #000; border-radius: 4px; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #3d4f6e; position: relative;">
        <span style="color: #4a5568; font-family: monospace; font-size: 11px;">[PANTALLA DE VIDEO OFFLINE]</span>
    </div>

    <div style="width: 100%; display: flex; align-items: center; margin-bottom: 8px; background: #0f1520; padding: 4px; border-radius: 3px; border: 1px solid #2b3a52; box-sizing: border-box;">
        <span style="font-size: 9px; color: #a855f7; font-family: monospace; font-weight: bold; margin-right: 6px; letter-spacing: 1px;">TIME:</span>
        <input type="range" id="progreso-video-slider" min="0" max="100" value="0" step="0.1"
               oninput="window.scrollearProgresoVideo(this.value)"
               style="flex-grow: 1; accent-color: #00d4ff; cursor: pointer; height: 6px;">
        <div style="font-size: 10px; color: #00ff66; font-family: monospace; margin-left: 8px; min-width: 75px; text-align: right;">
            <span id="vid-tiempo-actual">00:00</span> / <span id="vid-tiempo-total">00:00</span>
        </div>
    </div>

    <div style="width: 100%; display: flex; gap: 6px; margin-bottom: 6px; box-sizing: border-box;">
        <select id="selectorPlataformaVideo" style="background: #161f2c; border: 1px solid #3d4f6e; color: #a855f7; font-family: monospace; font-size: 11px; padding: 5px; outline: none; border-radius: 3px; cursor: pointer;">
            <option value="youtube">YouTube</option>
            <option value="dailymotion">Dailymotion</option>
        </select>

        <input type="text" id="input-url-video-stream" 
               placeholder="Escribí palabras clave o pegá un link directo..." 
               style="flex-grow: 1; background: #161f2c; border: 1px solid #3d4f6e; color: #00d4ff; padding: 6px; font-family: monospace; font-size: 11px; outline: none; border-radius: 3px; box-sizing: border-box;">
        
        <button onclick="window.buscarVideoPlataforma()" style="border-color: #00ff66; color: #00ff66; font-size: 11px; padding: 5px 10px; font-family: monospace; font-weight: bold; background: #2e3d54; border: 1px solid #3d4f6e; cursor: pointer; border-radius: 3px;">🔍 BUSCAR</button>
    </div>

    <div id="listaResultadosVideo" style="width: 100%; max-height: 120px; overflow-y: auto; background: #0f1520; border: 1px solid #2b3a52; border-radius: 3px; margin-bottom: 8px; display: none; padding: 4px; box-sizing: border-box;">
        </div>

    <div class="info-tema" id="nombreVideo" style="background: #0f1520; padding: 4px; border: 1px solid #2b3a52; border-radius: 3px; font-size: 11px; color: #00ff66; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">VIDEO: (Ninguno cargado)</div>
    
    <div class="controles" style="margin-top: 8px;">
        <div class="fila-botones" style="display: flex; gap: 4px;">
            <button onclick="document.getElementById('inputVideo').click()" style="flex: 1; font-size: 10px; padding: 5px; cursor: pointer;">📂 CARGAR ARCHIVOS</button>
            <input type="file" id="inputVideo" accept="video/*, .mp4, .mkv, .avi" multiple onchange="window.agregarAplaylist(this, 'video')" style="display: none;">
            <button onclick="window.limpiarPlaylist('video')" style="color: #ff5555; border-color: #ff3333; font-size: 10px; padding: 5px; cursor: pointer;">❌ VACIAR</button>
        </div>
        
        <div class="fila-botones" style="margin-top: 5px; display: flex; gap: 4px;">
            <button onclick="window.anteriorTrack('video')" style="flex: 1; font-size: 10px; padding: 5px; cursor: pointer;">⏮ PREV</button>
            <button onclick="window.controlarVideoNativo('play')" style="flex: 1; font-size: 10px; padding: 5px; cursor: pointer; color: #00ff66; font-weight: bold;">▶ PLAY</button>
            <button onclick="window.controlarVideoNativo('pause')" style="flex: 1; font-size: 10px; padding: 5px; cursor: pointer; color: #ffb700; font-weight: bold;">⏸ PAUSE</button>
            <button onclick="window.controlarVideoNativo('stop')" style="flex: 1; font-size: 10px; padding: 5px; cursor: pointer; color: #ff5555;">⏹ STOP</button>
            <button onclick="window.anteriorTrack('video')" style="flex: 1; font-size: 10px; padding: 5px; cursor: pointer;">⏭ NEXT</button>
        </div>
        
        <div class="fila-volumen" style="margin-top: 8px; display: flex; align-items: center; justify-content: space-between; background: #0f1520; padding: 4px; border-radius: 3px; border: 1px solid #2b3a52;">
            <span style="font-size: 9px; color: #a855f7; font-family: monospace; font-weight: bold; letter-spacing: 1px;">VOL VIDEO:</span>
            <input type="range" id="volumen-video-slider" min="0" max="1" step="0.05" value="1" 
                   oninput="window.ajustarVolumenVideo(this.value)" 
                   style="flex-grow: 1; margin: 0 10px; accent-color: #a855f7; cursor: pointer; height: 6px;">
            <span id="txtVolumenVideo" style="font-size: 10px; color: #00ff66; font-family: monospace; min-width: 35px; text-align: right;">100%</span>
        </div>
    </div>
</div>
