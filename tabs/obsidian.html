<div class="workspace-layout" style="display: flex; width: 100%; height: 100%; background: #2b3a52; overflow: hidden; margin-top: 0px;">
    
    <div class="sidebar" style="width: 250px; background: #1e293b; border-right: 1px solid #3d4f6e; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; height: 100%;">
        <div class="sidebar-title" style="font-size: 11px; font-weight: bold; color: #a855f7; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center;">
            <span>📓 VAULT OBSIDIAN</span>
            <button onclick="window.abrirSelectorCarpeta('notes')" style="font-size: 10px; padding: 2px 6px; background: #3a4b66; border: 1px solid #7000ff; color: #00d4ff; cursor: pointer;">📂 Abrir</button>
        </div>
        
        <div style="display: flex; gap: 4px; margin-bottom: 10px;">
            <button onclick="window.crearNuevaNota()" style="flex-grow: 1; font-size: 11px; padding: 5px; background: #161f2c; border: 1px solid #00d4ff; color: #00d4ff; font-weight: bold;">+ Nueva Nota</button>
            <button onclick="window.crearNuevaCarpetaNota()" style="flex-grow: 1; font-size: 11px; padding: 5px; background: #161f2c; border: 1px solid #a855f7; color: #a855f7; font-weight: bold;">+ Carpeta</button>
        </div>

        <div id="listaNotasMD" class="list-tree" style="flex-grow: 1; overflow-y: auto; font-size: 12px; color: #cbd5e0; display: flex; flex-direction: column; gap: 2px;">
            <div style="color: #555; text-align: center; padding-top: 20px;">Ningún Vault vinculado</div>
        </div>
    </div>

    <div class="main-content-area" style="flex-grow: 1; display: flex; flex-direction: column; background: #243146; height: 100%;">
        <div style="background: #1e293b; padding: 6px 12px; font-size: 11px; color: #00d4ff; border-bottom: 1px solid #3d4f6e; font-weight: bold;">
            <span id="ruta-nota-activa">ARCHIVO: (Ninguno seleccionado)</span>
        </div>
        <textarea class="obsidian-textarea" id="editorObsidian" placeholder="# Tus apuntes en Markdown..." oninput="window.guardarNotaObsidian()" style="flex-grow: 1; background: #243146; color: #e2e8f0; border: none; padding: 15px; font-family: monospace; font-size: 14px; resize: none; outline: none; line-height: 1.6; height: 100%;"></textarea>
    </div>
</div>
